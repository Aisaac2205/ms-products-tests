# ============================================================
# ms-products-tests — .github/workflows/ci.yml
# ============================================================

name: E2E Tests - ms-products-api

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Quien disparo este workflow?"
        required: false
        default: "manual"
      commit_sha:
        description: "SHA del commit de la API"
        required: false
      branch:
        description: "Branch de la API"
        required: false

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:

  context:
    name: Contexto del trigger
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar quien disparo el pipeline
        run: |
          echo "Disparado por: ${{ github.event.inputs.triggered_by || 'push/PR directo' }}"
          echo "API commit SHA: ${{ github.event.inputs.commit_sha || 'N/A' }}"
          echo "API branch: ${{ github.event.inputs.branch || 'N/A' }}"

  lint:
    name: Lint TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Correr ESLint
        run: pnpm run lint

  e2e:
    name: E2E Tests con Playwright
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: productsdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Clonar ms-products-api
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ms-products-api
          path: api

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Instalar dependencias FastAPI
        run: pip install -r api/requirements.txt

      - name: Levantar FastAPI en background
        run: |
          cd api
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn.log 2>&1 &
          echo "PID uvicorn: $!"
        env:
          DATABASE_URL: postgresql://testuser:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/productsdb
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Esperar que la API este lista
        run: npx wait-on http-get://localhost:8000/health --timeout 30000

      - name: Mostrar logs de uvicorn si fallo
        if: failure()
        run: cat /tmp/uvicorn.log

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Instalar dependencias Playwright
        run: pnpm install --frozen-lockfile

      - name: Instalar browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Correr tests E2E
        run: pnpm test
        env:
          BASE_URL: http://localhost:8000
          CI: true

      - name: Subir reporte HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

  summary:
    name: Resultado Final
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always()

    steps:
      - name: Tests pasaron
        if: needs.e2e.result == 'success'
        run: echo "Todos los tests E2E pasaron correctamente."

      - name: Tests fallaron
        if: needs.e2e.result == 'failure'
        run: |
          echo "Tests fallaron. Revisar el reporte en la seccion Artifacts."
          exit 1